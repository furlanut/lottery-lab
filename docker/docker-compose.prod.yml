services:
  db:
    image: postgres:16-alpine
    container_name: lottery-db
    environment:
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lotto_prod_2026}
      POSTGRES_DB: lotto_convergent
    volumes:
      - lottery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotto -d lotto_convergent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: lottery-backend
    environment:
      DATABASE_URL: postgresql://lotto:${DB_PASSWORD:-lotto_prod_2026}@db:5432/lotto_convergent
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: lottery-frontend
    environment:
      NEXT_PUBLIC_API_URL: https://lottery.fl3.org/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lottery-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${LOTTERY_PORT:-8880}:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  lottery_pgdata:
