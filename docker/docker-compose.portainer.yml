services:
  db:
    image: postgres:16-alpine
    container_name: lottery-db
    environment:
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: LotteryLab2026!
      POSTGRES_DB: lotto_convergent
    volumes:
      - lottery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotto -d lotto_convergent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/furlanut/lottery-lab/backend:latest
    container_name: lottery-backend
    environment:
      DATABASE_URL: postgresql://lotto:LotteryLab2026!@db:5432/lotto_convergent
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8881:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/furlanut/lottery-lab/frontend:latest
    container_name: lottery-frontend
    environment:
      NEXT_PUBLIC_API_URL: https://lottery-api.fl3.org/api/v1
    ports:
      - "8880:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lottery_pgdata:
